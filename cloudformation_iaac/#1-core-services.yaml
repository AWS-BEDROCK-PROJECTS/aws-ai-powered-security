AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Workshop Starter App - AI-Powered Defense-in-Depth: Securing Serverless
  Microservices on AWS.
  Deploys the intentionally insecure Order API (API Gateway, Lambda, DynamoDB).
  All endpoints are unauthenticated at this stage — authentication is added
  when this stack is updated at the start of Module 2.

Parameters:
  EnvironmentName:
    Type: String
    Default: workshop
    Description: Environment name prefix for all resources.

Resources:

  # ============================================================
  # DATA LAYER — DynamoDB
  # Intentional weakness: uses AWS-owned encryption key.
  # Module 6 will migrate to a customer-managed KMS key.
  # ============================================================
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${EnvironmentName}-orders'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH
      Tags:
        - Key: Workshop
          Value: !Ref EnvironmentName

  # ============================================================
  # IAM — Lambda Execution Role
  # Intentional weakness: overly broad DynamoDB permissions.
  # Module 4 will tighten this to least privilege.
  # ============================================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-lambda-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !GetAtt OrdersTable.Arn
      Tags:
        - Key: Workshop
          Value: !Ref EnvironmentName

  # ============================================================
  # COMPUTE — Lambda Functions
  # ============================================================

  # Intentional weaknesses in this function:
  # 1. Hardcoded placeholder in environment variable (Module 5)
  # 2. Log injection vulnerability (Module 4)
  CreateOrderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${EnvironmentName}-create-order'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref OrdersTable
          SECRET_KEY: 'hardcoded-secret-replace-me'
      Code:
        ZipFile: |
          import json
          import boto3
          import uuid
          import os
          from datetime import datetime, timezone

          dynamodb = boto3.resource('dynamodb')

          def lambda_handler(event, context):
              table = dynamodb.Table(os.environ['TABLE_NAME'])
              try:
                  body = json.loads(event.get('body', '{}'))
                  order_id = str(uuid.uuid4())
                  # Log injection vulnerability — user input written directly to logs
                  print(f"Creating order for customer: {body.get('customerId')}")
                  item = {
                      'orderId': order_id,
                      'status': 'PENDING',
                      'createdAt': datetime.now(timezone.utc).isoformat(),
                      'items': body.get('items', []),
                      'customerId': body.get('customerId', 'anonymous')
                  }
                  table.put_item(Item=item)
                  return {
                      'statusCode': 201,
                      'headers': {'Content-Type': 'application/json'},
                      'body': json.dumps({'orderId': order_id, 'status': 'PENDING'})
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'headers': {'Content-Type': 'application/json'},
                      'body': json.dumps({'error': 'Internal server error'})
                  }
      Tags:
        - Key: Workshop
          Value: !Ref EnvironmentName

  # DecimalEncoder handles DynamoDB Decimal types that
  # json.dumps() cannot serialize natively.
  GetOrderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${EnvironmentName}-get-order'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref OrdersTable
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from decimal import Decimal

          dynamodb = boto3.resource('dynamodb')

          class DecimalEncoder(json.JSONEncoder):
              def default(self, obj):
                  if isinstance(obj, Decimal):
                      return int(obj) if obj % 1 == 0 else float(obj)
                  return super(DecimalEncoder, self).default(obj)

          def lambda_handler(event, context):
              table = dynamodb.Table(os.environ['TABLE_NAME'])
              try:
                  order_id = event['pathParameters']['orderId']
                  response = table.get_item(Key={'orderId': order_id})
                  order = response.get('Item')
                  if not order:
                      return {
                          'statusCode': 404,
                          'headers': {'Content-Type': 'application/json'},
                          'body': json.dumps({'error': 'Order not found'})
                      }
                  return {
                      'statusCode': 200,
                      'headers': {'Content-Type': 'application/json'},
                      'body': json.dumps(order, cls=DecimalEncoder)
                  }
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return {
                      'statusCode': 500,
                      'headers': {'Content-Type': 'application/json'},
                      'body': json.dumps({'error': 'Internal server error'})
                  }
      Tags:
        - Key: Workshop
          Value: !Ref EnvironmentName

  HealthCheckFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${EnvironmentName}-health-check'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      Code:
        ZipFile: |
          import json

          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'headers': {'Content-Type': 'application/json'},
                  'body': json.dumps({'status': 'healthy'})
              }
      Tags:
        - Key: Workshop
          Value: !Ref EnvironmentName

  # ============================================================
  # API GATEWAY — REST API
  # Intentional weakness: all methods use AuthorizationType: NONE.
  # Module 2 updates this stack to add Cognito authorization.
  # ============================================================
  OrderAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${EnvironmentName}-order-api'
      Description: >
        Workshop Order API. Intentionally insecure at this stage.
        Authentication added in Module 2 via stack update.
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: Workshop
          Value: !Ref EnvironmentName

  # --- Resources ---
  OrdersResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref OrderAPI
      ParentId: !GetAtt OrderAPI.RootResourceId
      PathPart: orders

  OrderIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref OrderAPI
      ParentId: !Ref OrdersResource
      PathPart: '{orderId}'

  HealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref OrderAPI
      ParentId: !GetAtt OrderAPI.RootResourceId
      PathPart: health

  # --- Methods (all open — no authentication at this stage) ---
  CreateOrderMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref OrderAPI
      ResourceId: !Ref OrdersResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations'
          - FunctionArn: !GetAtt CreateOrderFunction.Arn

  GetOrderMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref OrderAPI
      ResourceId: !Ref OrderIdResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations'
          - FunctionArn: !GetAtt GetOrderFunction.Arn

  HealthCheckMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref OrderAPI
      ResourceId: !Ref HealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations'
          - FunctionArn: !GetAtt HealthCheckFunction.Arn

  # --- Lambda Permissions ---
  CreateOrderPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt CreateOrderFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${OrderAPI}/*/POST/orders'

  GetOrderPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt GetOrderFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${OrderAPI}/*/GET/orders/*'

  HealthCheckPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt HealthCheckFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${OrderAPI}/*/GET/health'

  # --- Initial Deployment and Stage ---
  APIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - CreateOrderMethod
      - GetOrderMethod
      - HealthCheckMethod
    Properties:
      RestApiId: !Ref OrderAPI
      Description: 'Initial deployment - no authentication.'

  APIStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref OrderAPI
      DeploymentId: !Ref APIDeployment
      StageName: prod
      Description: >
        Initial stage - no authentication, no WAF, no throttling.
        All three are added when this stack is updated in Module 2.
      Tags:
        - Key: Workshop
          Value: !Ref EnvironmentName

Outputs:

  APIEndpoint:
    Description: Base URL for the Order API.
    Value: !Sub 'https://${OrderAPI}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Export:
      Name: !Sub '${AWS::StackName}-APIEndpoint'

  APIId:
    Description: >
      API Gateway REST API ID.
      Used in Module 2 to associate the WAF Web ACL.
    Value: !Ref OrderAPI
    Export:
      Name: !Sub '${AWS::StackName}-APIId'

  APIStage:
    Description: API Gateway stage name.
    Value: prod
    Export:
      Name: !Sub '${AWS::StackName}-APIStage'

  OrdersTableName:
    Description: DynamoDB Orders table name.
    Value: !Ref OrdersTable
    Export:
      Name: !Sub '${AWS::StackName}-OrdersTableName'

  OrdersTableArn:
    Description: DynamoDB Orders table ARN.
    Value: !GetAtt OrdersTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-OrdersTableArn'

  CreateOrderFunctionArn:
    Description: ARN of the Create Order Lambda function.
    Value: !GetAtt CreateOrderFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CreateOrderFunctionArn'

  GetOrderFunctionArn:
    Description: ARN of the Get Order Lambda function.
    Value: !GetAtt GetOrderFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-GetOrderFunctionArn'

  LambdaExecutionRoleArn:
    Description: ARN of the Lambda execution IAM role.
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaExecutionRoleArn'

  # Exported for Module 2 cross-stack references
  OrdersResourceId:
    Description: API Gateway /orders resource ID. Used in Module 2.
    Value: !Ref OrdersResource
    Export:
      Name: !Sub '${AWS::StackName}-OrdersResourceId'

  OrderIdResourceId:
    Description: API Gateway /orders/{orderId} resource ID. Used in Module 2.
    Value: !Ref OrderIdResource
    Export:
      Name: !Sub '${AWS::StackName}-OrderIdResourceId'

  HealthResourceId:
    Description: API Gateway /health resource ID. Used in Module 2.
    Value: !Ref HealthResource
    Export:
      Name: !Sub '${AWS::StackName}-HealthResourceId'

  HealthCheckFunctionArn:
    Description: ARN of the Health Check Lambda function. Used in Module 2.
    Value: !GetAtt HealthCheckFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-HealthCheckFunctionArn'
