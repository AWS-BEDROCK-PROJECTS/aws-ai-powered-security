AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Workshop Starter App - Updated for Module 5: Secrets Management.
  Updates the CreateOrderFunction to retrieve the application secret from
  AWS Secrets Manager at runtime instead of reading it from an environment
  variable. Adds SecretsManagerAccess and KMSDecrypt policies to the Lambda
  execution role scoped to the specific secret and KMS key deployed by the
  workshop-module5 stack.
  All other resources are unchanged from the Module 4 deployment.
  Depends on: workshop-module1 (UserPoolArn), workshop-module3 (subnet and
  security group IDs), workshop-module5 (secret ARN, secret name, KMS key ARN)

Parameters:
  EnvironmentName:
    Type: String
    Default: workshop
    Description: Environment name prefix for all resources.

Resources:

  # ============================================================
  # DATA LAYER — DynamoDB
  # Unchanged from Module 4 deployment.
  # ============================================================
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${EnvironmentName}-orders'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH
      Tags:
        - Key: Workshop
          Value: !Ref EnvironmentName

  # ============================================================
  # IAM — Lambda Execution Role
  # MODULE 5 CHANGE: SecretsManagerAccess policy added, granting
  # secretsmanager:GetSecretValue scoped to the specific secret
  # ARN deployed by the workshop-module5 stack. KMSDecrypt policy
  # added, granting kms:Decrypt scoped to the customer-managed
  # KMS key that encrypts the secret.
  # All other role configuration is unchanged from Module 4.
  # ============================================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-lambda-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource: !GetAtt OrdersTable.Arn
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !ImportValue 'workshop-module5-AppSecretArn'
        - PolicyName: KMSDecrypt
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !ImportValue 'workshop-module5-SecretsKMSKeyArn'
      Tags:
        - Key: Workshop
          Value: !Ref EnvironmentName

  # ============================================================
  # COMPUTE — Lambda Functions
  # MODULE 5 CHANGE to CreateOrderFunction:
  # - SECRET_NAME environment variable added, pointing to the
  #   Secrets Manager secret name exported by workshop-module5.
  # - Function code updated to retrieve the secret at runtime
  #   using the GetSecretValue API with in-memory caching.
  #   The cached value persists across invocations within the
  #   same Lambda execution environment, so the API call is
  #   made only once per cold start.
  # GetOrderFunction and HealthCheckFunction are unchanged.
  # ============================================================

  CreateOrderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${EnvironmentName}-create-order'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref OrdersTable
          SECRET_NAME: !ImportValue 'workshop-module5-AppSecretName'
      VpcConfig:
        SubnetIds:
          - !ImportValue 'workshop-module3-PrivateSubnet1Id'
          - !ImportValue 'workshop-module3-PrivateSubnet2Id'
        SecurityGroupIds:
          - !ImportValue 'workshop-module3-LambdaSecurityGroupId'
      Code:
        ZipFile: |
          import json
          import boto3
          import uuid
          import os
          from datetime import datetime, timezone

          dynamodb = boto3.resource('dynamodb')
          secrets_client = boto3.client('secretsmanager')

          # Cache secret to avoid retrieving on every invocation.
          # The cached value persists across invocations within the
          # same Lambda execution environment (warm starts).
          _secret_cache = None

          def get_app_secret():
              global _secret_cache
              if _secret_cache is None:
                  response = secrets_client.get_secret_value(
                      SecretId=os.environ['SECRET_NAME']
                  )
                  _secret_cache = json.loads(response['SecretString'])
              return _secret_cache

          def lambda_handler(event, context):
              table = dynamodb.Table(os.environ['TABLE_NAME'])
              try:
                  # Retrieve secret at runtime from Secrets Manager
                  secret = get_app_secret()
                  app_secret = secret.get('APP_SECRET')

                  body = json.loads(event.get('body', '{}'))
                  order_id = str(uuid.uuid4())
                  # Sanitize customerId to prevent log injection
                  safe_customer_id = str(body.get('customerId', 'anonymous')).replace('\n', ' ').replace('\r', ' ')
                  print(f"Creating order for customer: {safe_customer_id}")
                  item = {
                      'orderId': order_id,
                      'status': 'PENDING',
                      'createdAt': datetime.now(timezone.utc).isoformat(),
                      'items': body.get('items', []),
                      'customerId': body.get('customerId', 'anonymous')
                  }
                  table.put_item(Item=item)
                  return {
                      'statusCode': 201,
                      'headers': {'Content-Type': 'application/json'},
                      'body': json.dumps({'orderId': order_id, 'status': 'PENDING'})
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'headers': {'Content-Type': 'application/json'},
                      'body': json.dumps({'error': 'Internal server error'})
                  }
      Tags:
        - Key: Workshop
          Value: !Ref EnvironmentName

  GetOrderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${EnvironmentName}-get-order'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref OrdersTable
      VpcConfig:
        SubnetIds:
          - !ImportValue 'workshop-module3-PrivateSubnet1Id'
          - !ImportValue 'workshop-module3-PrivateSubnet2Id'
        SecurityGroupIds:
          - !ImportValue 'workshop-module3-LambdaSecurityGroupId'
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from decimal import Decimal

          dynamodb = boto3.resource('dynamodb')

          class DecimalEncoder(json.JSONEncoder):
              def default(self, obj):
                  if isinstance(obj, Decimal):
                      return int(obj) if obj % 1 == 0 else float(obj)
                  return super(DecimalEncoder, self).default(obj)

          def lambda_handler(event, context):
              table = dynamodb.Table(os.environ['TABLE_NAME'])
              try:
                  order_id = event['pathParameters']['orderId']
                  response = table.get_item(Key={'orderId': order_id})
                  order = response.get('Item')
                  if not order:
                      return {
                          'statusCode': 404,
                          'headers': {'Content-Type': 'application/json'},
                          'body': json.dumps({'error': 'Order not found'})
                      }
                  return {
                      'statusCode': 200,
                      'headers': {'Content-Type': 'application/json'},
                      'body': json.dumps(order, cls=DecimalEncoder)
                  }
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return {
                      'statusCode': 500,
                      'headers': {'Content-Type': 'application/json'},
                      'body': json.dumps({'error': 'Internal server error'})
                  }
      Tags:
        - Key: Workshop
          Value: !Ref EnvironmentName

  HealthCheckFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${EnvironmentName}-health-check'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      VpcConfig:
        SubnetIds:
          - !ImportValue 'workshop-module3-PrivateSubnet1Id'
          - !ImportValue 'workshop-module3-PrivateSubnet2Id'
        SecurityGroupIds:
          - !ImportValue 'workshop-module3-LambdaSecurityGroupId'
      Code:
        ZipFile: |
          import json

          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'headers': {'Content-Type': 'application/json'},
                  'body': json.dumps({'status': 'healthy'})
              }
      Tags:
        - Key: Workshop
          Value: !Ref EnvironmentName

  # ============================================================
  # API GATEWAY — REST API
  # Unchanged from Module 4 deployment.
  # ============================================================
  OrderAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${EnvironmentName}-order-api'
      Description: Workshop Order API.
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: Workshop
          Value: !Ref EnvironmentName

  OrdersResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref OrderAPI
      ParentId: !GetAtt OrderAPI.RootResourceId
      PathPart: orders

  OrderIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref OrderAPI
      ParentId: !Ref OrdersResource
      PathPart: '{orderId}'

  HealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref OrderAPI
      ParentId: !GetAtt OrderAPI.RootResourceId
      PathPart: health

  # Cognito Authorizer — unchanged from Module 2 deployment.
  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: !Sub '${EnvironmentName}-cognito-authorizer'
      RestApiId: !Ref OrderAPI
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - Fn::ImportValue: 'workshop-module1-UserPoolArn'
      AuthorizerResultTtlInSeconds: 300

  # Methods — unchanged from Module 2 deployment.
  CreateOrderMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref OrderAPI
      ResourceId: !Ref OrdersResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations'
          - FunctionArn: !GetAtt CreateOrderFunction.Arn

  GetOrderMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref OrderAPI
      ResourceId: !Ref OrderIdResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations'
          - FunctionArn: !GetAtt GetOrderFunction.Arn

  HealthCheckMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref OrderAPI
      ResourceId: !Ref HealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations'
          - FunctionArn: !GetAtt HealthCheckFunction.Arn

  # Lambda Permissions — unchanged from Module 2 deployment.
  CreateOrderPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt CreateOrderFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${OrderAPI}/*/POST/orders'

  GetOrderPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt GetOrderFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${OrderAPI}/*/GET/orders/*'

  HealthCheckPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt HealthCheckFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${OrderAPI}/*/GET/health'

  # Deployment and Stage — unchanged from Module 4 deployment.
  APIDeploymentV2:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - CreateOrderMethod
      - GetOrderMethod
      - HealthCheckMethod
      - CognitoAuthorizer
    Properties:
      RestApiId: !Ref OrderAPI
      Description: 'Module 2 - Cognito authorizer and throttling activated.'

  APIStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref OrderAPI
      DeploymentId: !Ref APIDeploymentV2
      StageName: prod
      Description: >
        Module 5 - Application secret migrated to AWS Secrets Manager with
        customer-managed KMS encryption. Lambda function retrieves secret at
        runtime via GetSecretValue API. Lambda functions remain in private VPC
        subnets. Cognito authorizer active. WAF Web ACL association added by
        workshop-module2 stack.
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          ThrottlingRateLimit: 10
          ThrottlingBurstLimit: 20
      Tags:
        - Key: Workshop
          Value: !Ref EnvironmentName

Outputs:

  APIEndpoint:
    Description: Base URL for the Order API.
    Value: !Sub 'https://${OrderAPI}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Export:
      Name: !Sub '${AWS::StackName}-APIEndpoint'

  APIId:
    Description: API Gateway REST API ID.
    Value: !Ref OrderAPI
    Export:
      Name: !Sub '${AWS::StackName}-APIId'

  APIStage:
    Description: API Gateway stage name.
    Value: prod
    Export:
      Name: !Sub '${AWS::StackName}-APIStage'

  OrdersTableName:
    Description: DynamoDB Orders table name.
    Value: !Ref OrdersTable
    Export:
      Name: !Sub '${AWS::StackName}-OrdersTableName'

  OrdersTableArn:
    Description: DynamoDB Orders table ARN.
    Value: !GetAtt OrdersTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-OrdersTableArn'

  CreateOrderFunctionArn:
    Description: ARN of the Create Order Lambda function.
    Value: !GetAtt CreateOrderFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CreateOrderFunctionArn'

  GetOrderFunctionArn:
    Description: ARN of the Get Order Lambda function.
    Value: !GetAtt GetOrderFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-GetOrderFunctionArn'

  LambdaExecutionRoleArn:
    Description: ARN of the Lambda execution IAM role.
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaExecutionRoleArn'

  OrdersResourceId:
    Description: API Gateway /orders resource ID.
    Value: !Ref OrdersResource
    Export:
      Name: !Sub '${AWS::StackName}-OrdersResourceId'

  OrderIdResourceId:
    Description: API Gateway /orders/{orderId} resource ID.
    Value: !Ref OrderIdResource
    Export:
      Name: !Sub '${AWS::StackName}-OrderIdResourceId'

  HealthResourceId:
    Description: API Gateway /health resource ID.
    Value: !Ref HealthResource
    Export:
      Name: !Sub '${AWS::StackName}-HealthResourceId'

  HealthCheckFunctionArn:
    Description: ARN of the Health Check Lambda function.
    Value: !GetAtt HealthCheckFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-HealthCheckFunctionArn'

  CognitoAuthorizerId:
    Description: ID of the Cognito authorizer.
    Value: !Ref CognitoAuthorizer
    Export:
      Name: !Sub '${AWS::StackName}-CognitoAuthorizerId'
