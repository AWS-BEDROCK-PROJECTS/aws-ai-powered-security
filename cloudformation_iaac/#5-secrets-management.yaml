AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Module 5 - Secrets Management with AWS Secrets Manager and AWS KMS
  Workshop: AI-Powered Defense-in-Depth for Serverless Application
  Depends on: workshop-starter-app (UPDATE_COMPLETE from Module 4),
  workshop-module3 (VPC, subnets, security group)
  Deploys: Customer-managed KMS key with automatic key rotation enabled,
  Secrets Manager secret encrypted with the KMS key, Secrets Manager Interface VPC endpoint
  with dedicated security group for private network access from Lambda functions.
  After deploying this stack, update the workshop-starter-app stack using
  workshop-starter-app-module5.yaml to configure the Lambda function to
  retrieve the secret at runtime from Secrets Manager.

Parameters:

  EnvironmentName:
    Type: String
    Default: workshop
    AllowedPattern: '[a-z0-9\-]+'
    Description: >
      Environment name used for resource naming.
      Must match the EnvironmentName value used in previous stacks.

Resources:

  # ============================================================
  # KMS KEY FOR SECRETS MANAGER ENCRYPTION
  # Customer-managed key replaces the default AWS-managed
  # aws/secretsmanager key, providing full control over key
  # policy, rotation, and audit trail.
  #
  # EnableKeyRotation: true — AWS KMS automatically rotates
  # the key material annually. Previous key versions are
  # retained for decryption of older ciphertext. New encrypt
  # operations use the latest key material. Existing secrets
  # remain encrypted with the original key version — KMS
  # handles version selection transparently during decryption.
  #
  # Key policy grants:
  # - Root account: full key management via IAM policies
  # - Secrets Manager service: encrypt/decrypt for secret
  #   storage and retrieval
  # - Lambda execution role: decrypt only, for runtime
  #   secret retrieval via GetSecretValue
  # ============================================================
  SecretsKMSKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Description: !Sub 'Customer-managed KMS key for ${EnvironmentName} secrets encryption'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRootAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowSecretsManagerUse
            Effect: Allow
            Principal:
              Service: secretsmanager.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
              - kms:DescribeKey
            Resource: '*'
          - Sid: AllowLambdaDecrypt
            Effect: Allow
            Principal:
              AWS: !ImportValue 'workshop-starter-app-LambdaExecutionRoleArn'
            Action:
              - kms:Decrypt
              - kms:DescribeKey
            Resource: '*'

  SecretsKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${EnvironmentName}-secrets-key'
      TargetKeyId: !Ref SecretsKMSKey

  # ============================================================
  # SECRETS MANAGER SECRET
  # Stores the application secret that replaces the hardcoded
  # SECRET_KEY environment variable removed in Module 4.
  #
  # KmsKeyId references the customer-managed key above,
  # overriding the default AWS-managed aws/secretsmanager key.
  #
  # The secret name follows the pattern {environment}/app-secret
  # to support environment-based access control in IAM policies
  # using wildcard resource ARNs.
  #
  # SecretString contains a JSON structure with the APP_SECRET
  # key. The Lambda function parses this JSON at runtime to
  # retrieve the secret value.
  # ============================================================
  AppSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Sub '${EnvironmentName}/app-secret'
      Description: >
        Application secret replacing the hardcoded SECRET_KEY
        environment variable removed in Module 4. Retrieved at
        runtime by the workshop-create-order Lambda function.
        Encrypted with a customer-managed KMS key.
      KmsKeyId: !Ref SecretsKMSKey
      SecretString: !Sub '{"APP_SECRET": "${EnvironmentName}-secure-generated-value-replace-before-production"}'

  # ============================================================
  # SECURITY GROUP — Secrets Manager VPC Endpoint
  # Interface VPC endpoint ENIs need to accept inbound HTTPS
  # connections from the Lambda functions. The Lambda security
  # group (deployed in Module 3) has no inbound rules — it was
  # designed for Lambda ENIs that only make outbound connections.
  # VPC endpoint ENIs are the opposite: they receive inbound
  # connections from the Lambda functions.
  #
  # This dedicated security group allows inbound HTTPS (443)
  # from the Lambda security group only, following the principle
  # of least privilege at the network layer.
  # ============================================================
  SecretsManagerEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${EnvironmentName}-secretsmanager-endpoint-sg'
      GroupDescription: 'Security group for Secrets Manager VPC endpoint. Allows inbound HTTPS from Lambda security group.'
      VpcId: !ImportValue 'workshop-module3-VPCId'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !ImportValue 'workshop-module3-LambdaSecurityGroupId'
          Description: 'Allow HTTPS inbound from Lambda functions.'
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-secretsmanager-endpoint-sg'
        - Key: Workshop
          Value: !Ref EnvironmentName

  # ============================================================
  # SECRETS MANAGER INTERFACE VPC ENDPOINT
  # Lambda functions run in private VPC subnets with no internet
  # access (Module 3). The DynamoDB Gateway VPC endpoint deployed
  # in Module 3 only covers DynamoDB traffic. For the Lambda
  # function to call secretsmanager:GetSecretValue, it needs a
  # network path to the Secrets Manager service endpoint.
  #
  # Interface VPC endpoints create ENIs in the specified subnets
  # and use private DNS to resolve the service hostname to
  # private IP addresses within the VPC. With
  # PrivateDnsEnabled: true, the standard Secrets Manager
  # endpoint hostname (secretsmanager.{region}.amazonaws.com)
  # resolves to the private ENI addresses — no code changes
  # required in the Lambda function.
  #
  # The endpoint uses a dedicated security group that allows
  # inbound HTTPS from the Lambda security group. This is
  # required because the Lambda security group has no inbound
  # rules — it only allows outbound HTTPS. The endpoint ENIs
  # need to accept the inbound connections that the Lambda
  # functions initiate.
  #
  # Unlike Gateway endpoints, Interface endpoints incur an
  # hourly charge per AZ plus data processing charges.
  # ============================================================
  SecretsManagerVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !ImportValue 'workshop-module3-VPCId'
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.secretsmanager'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !ImportValue 'workshop-module3-PrivateSubnet1Id'
        - !ImportValue 'workshop-module3-PrivateSubnet2Id'
      SecurityGroupIds:
        - !Ref SecretsManagerEndpointSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-secretsmanager-endpoint'
        - Key: Workshop
          Value: !Ref EnvironmentName
          
Outputs:

  AppSecretArn:
    Description: >
      ARN of the Secrets Manager secret.
      Used in the workshop-starter-app-module5.yaml update to scope
      the Lambda execution role SecretsManagerAccess policy.
    Value: !Ref AppSecret
    Export:
      Name: !Sub '${AWS::StackName}-AppSecretArn'

  AppSecretName:
    Description: >
      Name of the Secrets Manager secret.
      Used in the workshop-starter-app-module5.yaml update as the
      SECRET_NAME environment variable for the Lambda function.
    Value: !Sub '${EnvironmentName}/app-secret'
    Export:
      Name: !Sub '${AWS::StackName}-AppSecretName'

  SecretsKMSKeyArn:
    Description: >
      ARN of the customer-managed KMS key.
      Used in the workshop-starter-app-module5.yaml update to scope
      the Lambda execution role kms:Decrypt permission.
    Value: !GetAtt SecretsKMSKey.Arn
    Export:
      Name: !Sub '${AWS::StackName}-SecretsKMSKeyArn'

  SecretsKMSKeyId:
    Description: ID of the customer-managed KMS key.
    Value: !Ref SecretsKMSKey
    Export:
      Name: !Sub '${AWS::StackName}-SecretsKMSKeyId'

  SecretsManagerVPCEndpointId:
    Description: Secrets Manager Interface VPC endpoint ID.
    Value: !Ref SecretsManagerVPCEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-SecretsManagerVPCEndpointId'
